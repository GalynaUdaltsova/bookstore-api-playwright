name: Bookstore Tests With Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every Monday night at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: qa
        type: choice
        options:
          - qa
          - staging
      test_type:
        description: 'Test type to run'
        required: true
        default: all
        type: choice
        options:
          - api
          - ui
          - all
      test_group:
        description: 'Test groups to run'
        required: false
        default: all
        type: choice
        options:
          - smoke
          - regression
          - smoke,regression
          - all

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: TypeScript type check
        run: npm run type-check

      - name: Run code-quality check
        run: npm run code-quality

  test:
    name: Run Tests in Docker
    runs-on: ubuntu-latest
    needs: code-quality
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      test_type: ${{ steps.set-env.outputs.test_type }}
      test_group: ${{ steps.set-env.outputs.test_group }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        id: set-env
        run: |
          echo "environment=${{ github.event.inputs.environment || 'qa' }}" >> $GITHUB_OUTPUT
          echo "test_type=${{ github.event.inputs.test_type || 'all' }}" >> $GITHUB_OUTPUT
          echo "test_group=${{ github.event.inputs.test_group || 'all' }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t bookstore-tests .

      - name: Create folder for Allure results
        run: mkdir -p allure-results test-results

      - name: Run tests inside Docker
        run: |
          TEST_TYPE="${{ steps.set-env.outputs.test_type }}"
          TEST_GROUP="${{ steps.set-env.outputs.test_group }}"
          ENVIRONMENT="${{ steps.set-env.outputs.environment }}"

          echo "Running tests with ENV=$ENVIRONMENT, TEST_TYPE=$TEST_TYPE, TEST_GROUP=$TEST_GROUP"

          # Set secrets from GitHub Secrets
          if [ "$ENVIRONMENT" = "staging" ]; then
            API_BASE_URL=${{ secrets.API_BASE_URL_STAGING }}
            API_KEY=${{ secrets.API_KEY_STAGING }}
            UI_BASE_URL=${{ secrets.UI_BASE_URL_STAGING }}
          else
            API_BASE_URL=${{ secrets.API_BASE_URL_QA }}
            API_KEY=${{ secrets.API_KEY_QA }}
            UI_BASE_URL=${{ secrets.UI_BASE_URL }}
          fi

          # Copy previous results to preserve history
          if [ -d "allure-results/history" ]; then
            cp -r allure-results/history allure-history-backup || true
          fi

          docker run --rm \
            -e ENV=$ENVIRONMENT \
            -e TEST_TYPE=$TEST_TYPE \
            -e TEST_GROUP=$TEST_GROUP \
            -e API_BASE_URL=$API_BASE_URL \
            -e API_KEY=$API_KEY \
            -e UI_BASE_URL=$UI_BASE_URL \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            bookstore-tests \
            ./docker-entrypoint.sh

          # Restore history if Docker didn't preserve it
          if [ -d "allure-history-backup" ] && [ ! -d "allure-results/history" ]; then
            mv allure-history-backup allure-results/history
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ steps.set-env.outputs.environment }}
          path: allure-results/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.set-env.outputs.environment }}
          path: test-results/
          retention-days: 30

  deploy:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-${{ needs.test.outputs.environment }}
          path: allure-results

      - name: Checkout gh-pages branch for history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Download previous Allure history
        run: |
          # Copy history from gh-pages if it exists
          mkdir -p allure-results/history
          if [ -d "gh-pages/history" ]; then
            echo "Found previous history, copying to allure-results"
            cp -r gh-pages/history/* allure-results/history/
          fi

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          # Generate report with history
          allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: false

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
      - name: Notify success
        if: needs.test.result == 'success'
        run: echo "All tests for ${{ needs.test.outputs.environment }} passed successfully!"

      - name: Notify failure
        if: needs.test.result == 'failure'
        run: echo "Tests failed for ${{ needs.test.outputs.environment }}. Check logs and Allure report."